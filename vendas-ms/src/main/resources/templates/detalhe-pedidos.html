<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos do Cliente</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">
<div class="max-w-4xl mx-auto p-4">

    <div th:replace="~{fragments.html :: navbar('pedidos')}"></div>


    <div th:replace="~{fragments.html :: dadosCliente('Pedidos', true)}"></div>

    <table class="w-full mt-4 bg-white shadow-md rounded-md">
        <thead>
        <tr class="bg-gray-200">
            <th class="py-2" th:text="#{table.header.id}">Id</th>
            <th class="py-2" th:text="#{table.header.description}">Descrição da venda</th>
            <th class="py-2" th:text="#{table.header.status}">Status</th>
        </tr>
        </thead>
        <tbody>

        <tr th:if="${pedidos.isEmpty()}">
            <td colspan="3" class="py-2 text-center text-gray-500">
                Nenhum pedido registrado
            </td>
        </tr>


        <tr th:unless="${pedidos.isEmpty()}" th:each="pedido : ${pedidos}" class="border-t">
            <td class="py-2 text-center text-xs text-gray-400" th:text="${pedido.id}"></td>
            <td class="py-2 text-center" th:text="${pedido.descricao}"></td>
            <td class="py-2 text-center" th:text="${pedido.status}"></td>
        </tr>

        </tbody>
    </table>

</div>
</body>
</html>
