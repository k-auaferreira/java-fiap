<!DOCTYPE html>

<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Pedido</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">
<div class="max-w-4xl mx-auto p-4">


    <div th:replace="~{fragments.html :: navbar('pedidos')}"></div>

    <div th:replace="~{fragments.html :: dadosCliente('Novo Pedido', false)}"></div>

    <div class="bg-white p-4 mt-4 shadow-md rounded-md">
        <h1 class="text-2xl font-bold text-gray-800 mb-4">Novo Pedido</h1>

        <form th:action="@{/pedidos/novo/salvar}" method="post" class="space-y-4" th:object="${pedido}">

            <input th:field="${pedido.cpf}" th:value="${pedido.cpf}" type="hidden" name="cpf" value="12345678900"/>

            <!-- Descrição -->
            <div class="flex flex-col">
                <label for="descricao" class="text-sm font-medium text-gray-700 mb-1">
                    Descrição
                </label>
                <textarea id="descricao" name="descricao"
                          placeholder="Descreva o pedido"
                          class="w-full border rounded px-2 py-1 resize-none" th:value="*{descricao}"
                          rows="3">Notebook Dell XPS 15 — 32GB RAM, 1TB SSD</textarea>
            </div>

            <select name="status">
                <option th:each="s : ${status}"
                        th:value="${s.name()}"
                        th:text="${s.name()}">STATUS
                </option>
            </select>

            <div class="flex justify-end">
                <button type="submit"
                        class="px-4 py-2 bg-gray-800 text-white rounded">
                    Salvar Pedido
                </button>
            </div>
        </form>
    </div>

</div>
</body>
</html>
